<!DOCTYPE html>
<html>
<head>
    <title>Envelope Canvas</title>
    <style>
        .envelope {
    position: relative;
    top:200px;
    left:200px;
    /* border:2px solid black; */
    /* transform: rotate(90deg);
    transform-origin: center;  changed from "top left" */
}
        .msg{
            width:270px;
            height:170px;
            position:absolute;
            /* display:block; */
            top:100px;
            left:65px;
            background-color:rgb(174, 122, 122);
            z-index:1;
            clip-path:inset(100%,0,0,0);

        }
        #mycanvas{
            position:relative;
            z-index:2;

        }
    </style>
</head>
<body>

<div class="envelope">
    <canvas id="mycanvas" width="400" height="400"></canvas>
    <div class="msg" >

hihihi
    </div>
</div>

<button onclick="openEnvelope()">OPEN</button>
<button onclick="closeEnvelope()">CLOSE</button>

<script>
const canvas = document.getElementById("mycanvas");
const ctx = canvas.getContext("2d");

let flapy = 200;

// draw function
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // body
    ctx.fillStyle="#4da6ff";
    ctx.fillRect(50,100,300,200);
    ctx.strokeRect(50,100,300,200);

    // flap
    ctx.beginPath();
    ctx.moveTo(50,100);
    ctx.lineTo(200,flapy);
    ctx.lineTo(350,100);
    ctx.closePath();
    ctx.fillStyle="#3399ff";
    ctx.fill();
    ctx.stroke();
}

// open animation
function openEnvelope(){
    let interval = setInterval(()=>{
        if(flapy > 30){
            flapy -= 3;
            draw();
        } else {
            clearInterval(interval);
        }
    },16);
}

// close animation
function closeEnvelope(){
    let interval = setInterval(()=>{
        if(flapy < 200){
            flapy += 3;
            draw();
        } else {
            clearInterval(interval);
        }
    },16);
}
function setMsgReveal(ratio) {
    msgDiv.style.clipPath = `inset(${(1 - ratio) * 100}% 0 0 0)`;
}


// initial draw
draw();
</script>

</body>
</html>
